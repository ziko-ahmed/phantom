<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Zulqarnain Ahmed</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: hsl(230, 25%, 5%);
      color: hsl(210, 15%, 95%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    
    .container {
      text-align: center;
      padding: 2rem;
      background: hsl(235, 18%, 10%);
      border-radius: 20px;
      border: 1px solid hsl(220, 15%, 18%);
      box-shadow: 0 24px 80px hsla(0, 0%, 0%, 0.25);
    }
    
    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, hsl(180, 100%, 60%) 0%, hsl(200, 90%, 55%) 50%, hsla(220, 85%, 50%, 0.8) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    
    h1 {
      color: hsl(180, 100%, 60%);
      margin-bottom: 1rem;
    }
    
    p {
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, hsl(180, 100%, 60%) 0%, hsl(200, 90%, 55%) 50%, hsla(220, 85%, 50%, 0.8) 100%);
      color: hsl(230, 25%, 5%);
      text-decoration: none;
      border-radius: 14px;
      font-weight: 500;
      transition: transform 0.3s ease;
    }
    
    .btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">✓</div>
    <h1>Message Sent Successfully!</h1>
    <p>Thank you for reaching out! I've received your message and will get back to you as soon as possible.</p>
    <a href="/" class="btn">Back to Portfolio</a>
  </div>

  <script>
    // Auto redirect after 5 seconds
    setTimeout(() => {
      window.location.href = '/';
    }, 5000);
  </script>
</body>
</html>
